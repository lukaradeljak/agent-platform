name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/agent-platform
            git stash
            git pull origin main

            # Copiar base files al directorio compartido de agentes
            mkdir -p /opt/agents
            cp agents/base_agent.py /opt/agents/base_agent.py
            cp agents/registry.py /opt/agents/registry.py
            cp agents/__init__.py /opt/agents/__init__.py

            # Instalar deps de todos los agentes
            for req in /opt/agents/*/requirements.txt; do
              [ -f "$req" ] && docker compose exec -T celery_worker pip install -r "$req" 2>/dev/null || true
            done

            # Rebuild + force-recreate para que Celery re-importe schedules
            docker compose up -d --build --force-recreate --remove-orphans
